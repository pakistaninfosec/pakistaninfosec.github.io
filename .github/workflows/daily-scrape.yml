name: Daily Threat Intelligence Scrape

on:
  schedule:
    # 04:00 UTC = 09:00 PKT every day
    - cron: '0 4 * * *'
  workflow_dispatch:  # Manual trigger from Actions tab

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 groq feedparser

      - name: Run bridge script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python bridge_to_github.py

      - name: Commit data files
        run: |
          git config user.name "InfoSec Bot"
          git config user.email "bot@pakistaninfosec.github.io"
          git add data/
          git diff --staged --quiet || git commit -m "threat data: $(date -u +%Y-%m-%d)"
          git push
