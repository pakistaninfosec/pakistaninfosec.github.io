name: Daily Threat Intelligence Scrape

on:
  schedule:
    # 04:00 UTC = 09:00 PKT every day
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 groq feedparser lxml

      - name: Scrape Pakistan CERT + NCCS
        run: |
          python3 -c "
import json, os, glob
from scraper.sources.pakistan import scrape as scrape_pakistan

# Load existing records
files = glob.glob('scraper/output/infosec_products_*.json')
if files:
    latest = max(files, key=os.path.getmtime)
    with open(latest) as f:
        data = json.load(f)
else:
    data = {'records': [], 'total_records': 0}

# Add Pakistan records
pk_records = scrape_pakistan()
data['records'].extend(pk_records)
data['total_records'] = len(data['records'])

# Save back
os.makedirs('scraper/output', exist_ok=True)
from datetime import datetime
ts = datetime.now().strftime('%Y%m%d_%H%M%S')
outfile = f'scraper/output/infosec_products_{ts}.json'
with open(outfile, 'w') as f:
    json.dump(data, f, indent=2)
print(f'Saved {len(data[\"records\"])} records to {outfile}')
"
        continue-on-error: true

      - name: Convert and push to website
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python bridge_to_github.py

      - name: Commit data files
        run: |
          git config user.name "InfoSec Bot"
          git config user.email "bot@pakistaninfosec.github.io"
          git add data/threats.json data/reports.json
          git diff --staged --quiet || git commit -m "threat data: $(date -u +%Y-%m-%d)"
          git push
