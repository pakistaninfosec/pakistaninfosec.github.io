name: Daily Threat Intelligence Scrape

on:
  schedule:
    # 04:00 UTC = 09:00 PKT every day
    - cron: '0 4 * * *'
  workflow_dispatch:  # Manual trigger from Actions tab

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 groq feedparser lxml

      - name: Run scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -m scraper.main --sources nvd zeroday threat_intel --nvd-days 7 --nvd-max 200
        continue-on-error: true

      - name: Convert and push to website
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python bridge_to_github.py

      - name: Commit data files
        run: |
          git config user.name "InfoSec Bot"
          git config user.email "bot@pakistaninfosec.github.io"
          git add data/threats.json data/reports.json
          git diff --staged --quiet || git commit -m "threat data: $(date -u +%Y-%m-%d)"
          git push
