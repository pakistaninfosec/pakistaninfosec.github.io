name: Daily Threat Intelligence Scrape

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 groq feedparser lxml

      - name: Run bridge script
        env:
          GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPO: "${{ github.repository }}"
        run: |
          python bridge_to_github.py

      - name: Commit data files
        run: |
          git config user.name "InfoSec Bot"
          git config user.email "bot@pakistaninfosec.github.io"
          git pull --rebase origin main
          git add data/threats.json data/reports.json
          git diff --staged --quiet || git commit -m "threat data: $(date -u +%Y-%m-%d)"
          git push
