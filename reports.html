<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Reports — InfoSec Pakistan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#05080f;--bg2:#0b1120;--bg3:#111827;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8eaf0;--muted:#6b7280;--accent:#3b82f6;--accent2:#1d4ed8;--red:#ef4444;--orange:#f97316;--green:#22c55e;--yellow:#eab308;--cyan:#06b6d4;--font-mono:'JetBrains Mono',monospace;--font-display:'Syne',sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;line-height:1.6;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:rgba(5,8,15,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
  .nav-brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:800;font-size:15px;color:var(--text);text-decoration:none;}
  .nav-brand .shield{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .nav-links{display:flex;gap:4px;}
  .nav-links a{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;font-size:12px;transition:all 0.2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--bg3);}

  main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 32px;}
  h1{font-family:var(--font-display);font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px;}
  h1 span{color:var(--accent);}
  .subtitle{color:var(--muted);font-size:12px;margin-bottom:32px;}

  /* Report cards */
  .reports-list{display:flex;flex-direction:column;gap:16px;}
  .report-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color 0.2s;cursor:pointer;}
  .report-card:hover{border-color:var(--border2);}
  .report-card.expanded .report-body{display:block;}
  .report-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;}
  .report-date-badge{display:flex;align-items:center;gap:14px;}
  .date-block{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;}
  .date-block .day{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--accent);line-height:1;}
  .date-block .mon{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
  .report-meta h3{font-family:var(--font-display);font-size:15px;font-weight:700;}
  .report-meta p{font-size:11px;color:var(--muted);margin-top:3px;}
  .report-chips{display:flex;gap:8px;align-items:center;}
  .chip{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;letter-spacing:0.04em;}
  .chip-red{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
  .chip-orange{background:rgba(249,115,22,0.12);color:var(--orange);border:1px solid rgba(249,115,22,0.25);}
  .chip-green{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
  .chevron{color:var(--muted);font-size:16px;transition:transform 0.2s;}
  .report-card.expanded .chevron{transform:rotate(180deg);}

  .report-body{display:none;padding:0 24px 24px;}
  .report-divider{height:1px;background:var(--border);margin-bottom:20px;}

  /* Mini email view */
  .email-preview{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .email-header{background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px 24px;border-bottom:1px solid var(--border);}
  .email-header h2{font-family:var(--font-display);font-size:18px;font-weight:800;color:#fff;}
  .email-header p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px;}
  .email-stats{display:flex;gap:12px;margin-top:12px;}
  .email-stat{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 14px;text-align:center;}
  .email-stat .n{font-family:var(--font-display);font-size:20px;font-weight:800;}
  .email-stat.r .n{color:var(--red);}
  .email-stat.o .n{color:var(--orange);}
  .email-stat.g .n{color:var(--green);}
  .email-stat .l{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;}
  .section-header{padding:10px 24px;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid var(--border);}
  .section-header.red{background:rgba(239,68,68,0.08);color:var(--red);}
  .section-header.orange{background:rgba(249,115,22,0.08);color:var(--orange);}
  .section-header.green{background:rgba(34,197,94,0.08);color:var(--green);}
  .threat-item{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;}
  .threat-item:last-child{border-bottom:none;}
  .threat-item .tid{font-size:11px;color:var(--cyan);font-weight:600;white-space:nowrap;min-width:120px;}
  .threat-item .tdesc{font-size:11px;color:var(--muted);}
  .ai-block{padding:16px 24px;background:rgba(59,130,246,0.04);border-top:1px solid rgba(59,130,246,0.1);}
  .ai-block .ai-label{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
  .ai-block p{font-size:12px;color:var(--muted);line-height:1.7;}

  .loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);gap:10px;}
  .spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  footer{position:relative;z-index:1;text-align:center;padding:32px;border-top:1px solid var(--border);color:var(--muted);font-size:11px;margin-top:40px;}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">
    <div class="shield">🛡</div>
    InfoSec Pakistan
  </a>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="reports.html" class="active">Daily Reports</a>
    <a href="database.html">CVE Database</a>
  </div>
</nav>

<main>
  <h1>Daily <span>Reports</span></h1>
  <p class="subtitle">Archive of all daily threat intelligence digests · Click any report to expand</p>
  <div class="reports-list" id="reports-list">
    <div class="loading"><div class="spinner"></div> Loading reports...</div>
  </div>
</main>

<footer>InfoSec Pakistan · Daily Threat Intelligence · Updated daily at 09:00 PKT</footer>

<script>
const DEMO_REPORTS = [
  {
    date:"2026-05-10",
    stats:{new:70,zeroday:50,exploited:30,pakistan:8,total:299},
    summary:"The threat landscape remains dynamic with significant vulnerabilities emerging across enterprise software. Today's digest highlights critical RCE flaws, authentication bypass vulnerabilities, and directory traversal issues posing immediate risk to organizations in Pakistan.",
    sections:[
      {label:"Zero Day Exploits",color:"red",items:[
        {id:"CVE-2026-1234",desc:"RCE in Apache HTTP Server via malformed headers"},
        {id:"CVE-2026-1198",desc:"Auth bypass in Fortinet FortiOS SSL-VPN"},
      ]},
      {label:"Actively Exploited",color:"orange",items:[
        {id:"CVE-2026-0891",desc:"Directory traversal in Cisco IOS XE Web UI"},
        {id:"CVE-2026-0754",desc:"Privilege escalation in Windows Kernel"},
      ]},
      {label:"Pakistan Alerts",color:"green",items:[
        {id:"PKC-2026-041",desc:"Critical flaw in government portal authentication"},
        {id:"PKC-2026-039",desc:"Active exploitation of banking sector web app"},
      ]}
    ]
  },
  {
    date:"2026-05-09",
    stats:{new:45,zeroday:28,exploited:18,pakistan:5,total:229},
    summary:"Moderate threat day with notable vulnerabilities in database management systems and network devices. Several Pakistan-specific advisories issued by Pakistan CERT regarding telecom sector.",
    sections:[
      {label:"Zero Day Exploits",color:"red",items:[
        {id:"CVE-2026-0612",desc:"SQL injection in popular CMS plugin allows database extraction"},
      ]},
      {label:"Pakistan Alerts",color:"green",items:[
        {id:"PKC-2026-035",desc:"Telecom sector advisory: SS7 protocol exploitation detected"},
      ]}
    ]
  },
  {
    date:"2026-05-08",
    stats:{new:38,zeroday:20,exploited:12,pakistan:3,total:184},
    summary:"Lower-volume day with focus on web application vulnerabilities. XSS and CSRF flaws dominate today's entries. CISA updated its KEV catalog with 12 new entries.",
    sections:[
      {label:"Zero Day Exploits",color:"red",items:[
        {id:"CVE-2026-0421",desc:"XSS in widely-used email client web interface"},
        {id:"CVE-2026-0589",desc:"Buffer overflow in OpenSSL TLS handshake"},
      ]},
    ]
  }
];

function formatDate(d) {
  const dt = new Date(d);
  return {
    day: dt.getDate(),
    mon: dt.toLocaleString('en',{month:'short'}),
    full: dt.toLocaleDateString('en-PK',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
  };
}

async function loadReports() {
  let reports;
  try {
    const res = await fetch('data/reports.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    reports = data.reports || DEMO_REPORTS;
  } catch {
    reports = DEMO_REPORTS;
  }
  renderReports(reports);
}

function renderReports(reports) {
  document.getElementById('reports-list').innerHTML = reports.map((r, idx) => {
    const d = formatDate(r.date);
    return `
    <div class="report-card ${idx===0?'expanded':''}" id="card-${idx}">
      <div class="report-header" onclick="toggleCard(${idx})">
        <div class="report-date-badge">
          <div class="date-block">
            <div class="day">${d.day}</div>
            <div class="mon">${d.mon}</div>
          </div>
          <div class="report-meta">
            <h3>${d.full}</h3>
            <p>Daily Security Digest · ${r.stats.new} new threats · ${r.stats.total} monitored</p>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="report-chips">
            <span class="chip chip-red">🔴 ${r.stats.zeroday} Zero Day</span>
            <span class="chip chip-orange">🟠 ${r.stats.exploited} Exploited</span>
            <span class="chip chip-green">🇵🇰 ${r.stats.pakistan} PK Alerts</span>
          </div>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="report-body">
        <div class="report-divider"></div>
        <div class="email-preview">
          <div class="email-header">
            <h2>🛡 InfoSec Pakistan — Daily Security Digest</h2>
            <p>${d.full} · Threat Intelligence Report</p>
            <div class="email-stats">
              <div class="email-stat r"><div class="n">+${r.stats.new}</div><div class="l">New</div></div>
              <div class="email-stat o"><div class="n">${r.stats.exploited}</div><div class="l">Exploited</div></div>
              <div class="email-stat g"><div class="n">${r.stats.pakistan}</div><div class="l">PK Alerts</div></div>
            </div>
          </div>
          ${r.sections.map(s => `
            <div class="section-header ${s.color}">${s.color==='red'?'🔴':s.color==='orange'?'🟠':'🟢'} ${s.label}</div>
            ${s.items.map(i => `
              <div class="threat-item">
                <span class="tid">${i.id}</span>
                <span class="tdesc">${i.desc}</span>
              </div>
            `).join('')}
          `).join('')}
          <div class="ai-block">
            <div class="ai-label">◆ AI Analysis · Powered by Groq</div>
            <p>${r.summary}</p>
          </div>
        </div>
      </div>
    </div>
  `}).join('');
}

function toggleCard(idx) {
  const card = document.getElementById('card-' + idx);
  card.classList.toggle('expanded');
}

loadReports();
</script>
</body>
</html>
